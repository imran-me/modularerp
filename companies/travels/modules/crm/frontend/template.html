<!-- ============================================================================
  TRAVELS · CRM · MARKUP
  ----------------------------------------------------------------------------
  The screen's HTML, separated from its logic (frontend/crm.js). Cloned + filled
  at runtime via [data-tpl] / [data-slot] hooks.

  Five tabs (overview / pipeline / leads / follow-ups / comm-hub). The rich lead-
  detail MODAL, the stage stepper and the lead/activity forms keep their legacy
  el()-built DOM in the logic file (open on click, not the default render). The
  shared activity table is built by EPAL.table in logic. STYLING = the house
  design system; tw- utils only where the legacy captured screens used a static
  inline style: tw-cursor-pointer (action row) and tw-relative (chart box, its
  height stays a runtime inline style). The kanban column's --kb accent colour
  stays an inline style (dynamic per stage), as do the table-cell render strings.

  Each fragment is ONE line, no inter-tag whitespace — a clone is byte-for-byte
  the DOM the old ui.el() calls produced.
  ============================================================================ -->

<!-- page shell + section band ----------------------------------------------->
<template data-tpl="page"><div class="page"></div></template>
<template data-tpl="nav"><div class="tab-underline mb-3"></div></template>
<template data-tpl="nav-btn"><button></button></template>

<!-- KPI grid + plain KPI card + drill KPI card ------------------------------>
<template data-tpl="kpi-grid"><div class="kpi-grid kpi-compact stagger"></div></template>
<template data-tpl="kpi"><div class="kpi-card"><div class="kpi-top"><span class="kpi-label" data-slot="label"></span><span class="kpi-ico" data-slot="ico"></span></div><div class="kpi-value" data-slot="value"></div></div></template>
<template data-tpl="kpi-drill"><div class="kpi-card drill"><div class="kpi-top"><span class="kpi-label" data-slot="label"></span><span class="kpi-ico" data-slot="ico"></span></div><div class="kpi-value" data-slot="value"></div><div class="kpi-foot" data-slot="foot"></div></div></template>

<!-- generic layout bits ----------------------------------------------------->
<template data-tpl="section-label"><div class="section-label"></div></template>
<template data-tpl="grid-auto"><div class="grid-auto"></div></template>
<template data-tpl="card-body-card"><div class="card"><div class="card-body" data-slot="body"></div></div></template>
<template data-tpl="reg-card"><div class="card"><div class="card-head"><h3 data-slot="title"></h3><span class="card-sub" data-slot="sub"></span></div><div class="card-body" data-slot="body"></div></div></template>
<template data-tpl="head-btn-card"><div class="card"><div class="card-head"><h3 data-slot="title"></h3><span data-slot="action"></span></div><div class="card-body" data-slot="body"></div></div></template>
<template data-tpl="build-banner"><div class="build-banner mb-3"><i class="bi" data-slot="ico"></i><div data-slot="msg"></div></div></template>

<!-- chart card (relative box + canvas; height set in logic) ---------------->
<template data-tpl="chart-card"><div class="card"><div class="card-head"><h3 data-slot="title"></h3><span class="card-sub" data-slot="sub"></span></div><div class="card-body"><div class="tw-relative" data-slot="box"><canvas data-slot="canvas"></canvas></div></div></div></template>

<!-- overview Action Center row (cursor added in logic; chevron static) ----->
<template data-tpl="action-row"><div class="data-row"><span class="notif-ico" data-slot="ico"></span><div class="flex-1" data-slot="text"></div><span class="text-mute"><i class="bi bi-chevron-right"></i></span></div></template>

<!-- pipeline kanban: board + column (head) + list + card ------------------->
<template data-tpl="kanban"><div class="kanban"></div></template>
<template data-tpl="kb-col"><div class="kb-col"><div class="kb-col-head"><span class="kb-col-dot"></span><span class="kb-col-title" data-slot="title"></span><span class="kb-count" data-slot="count"></span></div></div></template>
<template data-tpl="kb-list"><div class="kb-list"></div></template>
<template data-tpl="kb-card"><div class="kb-card" draggable="true"><div class="kb-card-title" data-slot="title"></div><div class="text-mute xs" data-slot="sub"></div><div class="kb-card-foot"><span class="num strong" data-slot="value"></span><span class="badge" data-slot="owner"></span></div></div></template>
