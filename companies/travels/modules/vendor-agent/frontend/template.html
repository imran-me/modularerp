<!-- ============================================================================
  TRAVELS · VENDOR & AGENT · MARKUP
  ----------------------------------------------------------------------------
  Static shells only, separated from the logic (frontend/vendor-agent.js) and
  cloned + filled via [data-tpl] / [data-slot]. The desk is highly dynamic — the
  vendor/agent/customer directories, party-account ledgers, portal list and
  commission views keep their legacy el()-built DOM (with inline styles) in the
  logic file, exactly as before. Only the reusable page / section-nav / KPI
  shells live here, in house design-system classes verbatim (no Tailwind tw-).

  The KPI grid is a BASE shell — the logic re-stamps its exact class list per
  screen (kpi-grid · +stagger · +kpi-compact), so the screen-specific layout
  modifiers legitimately stay in the logic (as in hrm).

  Each fragment is ONE line, no inter-tag whitespace — a clone is byte-for-byte
  the DOM the old ui.el() calls produced.
  ============================================================================ -->

<template data-tpl="page"><div class="page"></div></template>
<template data-tpl="nav"><div class="tab-underline tabs-dense mb-3"></div></template>
<template data-tpl="nav-btn"><button></button></template>
<template data-tpl="kpi-grid"><div class="kpi-grid"></div></template>
<template data-tpl="kpi"><div class="kpi-card"><div class="kpi-top"><span class="kpi-label" data-slot="label"></span><span class="kpi-ico" data-slot="ico"></span></div><div class="kpi-value" data-slot="value"></div></div></template>
