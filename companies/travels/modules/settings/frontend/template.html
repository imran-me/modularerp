<!-- ============================================================================
  TRAVELS · SETTINGS · MARKUP
  ----------------------------------------------------------------------------
  The screen's HTML, separated from its logic (frontend/settings.js). Cloned +
  filled at runtime via [data-tpl] / [data-slot] hooks.

  The forms themselves are built by the shared EPAL.form engine from config
  arrays (those live in the logic file, being data) — so this template holds the
  card *shells*: the identity strip, the section nav, the save-able form card,
  the sample-numbering card, and the Data & Access cards.

  STYLING = the house design system (base.css / components.css) — those classes
  ARE the pixels the owner froze, so they stay verbatim. Tailwind tw- utilities
  appear ONLY where the legacy view used a static inline style:
    tw-text-[17px]   == old style="font-size:17px"   (identity display name)
    tw-min-w-[180px] == old style="min-width:180px"   (identity text column)
  The dynamic avatar background-image and the var(--bad) danger colours stay
  inline — they are runtime/theme values (migration decision #3), zero-drift.

  Each fragment is authored on ONE line — no inter-tag whitespace — so a clone
  is byte-for-byte the DOM the old ui.el() calls produced.
  ============================================================================ -->

<!-- page shell -------------------------------------------------------------->
<template data-tpl="page"><div class="page"></div></template>

<!-- identity preview strip (avatar · name/tagline · currency + FY badges) ---->
<template data-tpl="identity"><div class="card mb-3"><div class="card-body"><div class="flex items-center gap-2 flex-wrap"><span data-slot="avatar"></span><div class="flex-1 tw-min-w-[180px]"><div class="fw-700 tw-text-[17px]" data-slot="name"></div><div class="text-mute sm" data-slot="tagline"></div></div><span class="badge badge-good" data-slot="currency"></span><span class="badge" data-slot="fy"></span></div></div></div></template>

<!-- section nav — the house full-bleed underline band ----------------------->
<template data-tpl="nav"><div class="tab-underline mb-3"></div></template>
<template data-tpl="nav-btn"><button></button></template>

<!-- a form card with its own Save button (form.el fills [data-slot=form]) ---->
<template data-tpl="form-card"><div class="card"><div class="card-head"><h3 data-slot="title"></h3></div><div class="card-body"><div data-slot="form"></div><div class="flex justify-end mt-2"><button class="btn btn-primary" data-slot="save"><i class="bi bi-check-lg"></i> Save</button></div></div></div></template>

<!-- documents tab: sample numbering preview + one data-row ------------------->
<template data-tpl="sample-card"><div class="card"><div class="card-head"><h3><i class="bi bi-eye"></i> Sample Numbering</h3></div><div class="card-body"><div class="data-list" data-slot="rows"></div></div></div></template>
<template data-tpl="drow"><div class="data-row"><div class="text-mute sm flex-1" data-slot="k"></div><div class="strong" data-slot="v"></div></div></template>

<!-- notifications tab: automation build-banner (fully static) ---------------->
<template data-tpl="build-banner-automation"><div class="build-banner"><i class="bi bi-robot"></i><div>These preferences steer the bots in <strong>Travels ▸ Automation</strong> — open it to run or pause them individually.</div></div></template>

<!-- data tab: access shortcuts (fully static) ------------------------------->
<template data-tpl="access-card"><div class="card"><div class="card-head"><h3><i class="bi bi-sliders"></i> Access &amp; Control</h3></div><div class="card-body"><div class="flex gap-2 flex-wrap"><a class="btn btn-ghost" href="#/group/module-manager"><i class="bi bi-toggles2"></i> Module Control</a><a class="btn btn-ghost" href="#/group/employees/directory"><i class="bi bi-person-badge"></i> Group Workforce</a><a class="btn btn-ghost" href="#/travels/automation"><i class="bi bi-robot"></i> Automation</a><a class="btn btn-ghost" href="#/group/activity-log"><i class="bi bi-shield-lock"></i> Activity Log</a></div></div></div></template>

<!-- data tab: backup (export/restore buttons wired in logic) ----------------->
<template data-tpl="backup-card"><div class="card"><div class="card-head"><h3><i class="bi bi-download"></i> Backup</h3></div><div class="card-body"><p class="text-mute sm mb-2">Export this concern’s settings as JSON, or restore the defaults.</p><div class="flex gap-2 flex-wrap"><button class="btn btn-outline" data-slot="export"><i class="bi bi-filetype-json"></i> Export Settings</button><button class="btn btn-ghost" data-slot="restore"><i class="bi bi-arrow-counterclockwise"></i> Restore Defaults</button></div></div></div></template>

<!-- data tab: danger zone (var(--bad) colours kept inline; reload in logic) -->
<template data-tpl="danger-card"><div class="card"><div class="card-head"><h3><i class="bi bi-exclamation-triangle"></i> Danger Zone</h3></div><div class="card-body"><p class="text-mute sm mb-2">Reloading the demo dataset re-seeds ALL companies (irreversible for unsaved edits).</p><button class="btn btn-outline" style="color:var(--bad);border-color:var(--bad)" data-slot="reload"><i class="bi bi-arrow-repeat"></i> Reload Demo Data</button></div></div></template>
