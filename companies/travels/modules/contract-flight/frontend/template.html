<!-- ============================================================================
  TRAVELS · CONTRACT FLIGHT · MARKUP
  ----------------------------------------------------------------------------
  Static shells only, separated from the logic (frontend/contract-flight.js) and
  cloned + filled via [data-tpl] / [data-slot]. Contract Flight is a highly
  dynamic module — the deadline-risk alerts, occupancy ring-gauges, category
  charts, seat-block tables, the detail drawer and every modal/form keep their
  legacy el()-built DOM (with their inline styles) in the logic file, exactly as
  before. Only the reusable page / section-nav / KPI shells live here, using the
  house design-system classes verbatim (no Tailwind tw- utilities — the legacy
  static markup used none).

  Each fragment is ONE line, no inter-tag whitespace — a clone is byte-for-byte
  the DOM the old ui.el() calls produced.
  ============================================================================ -->

<!-- page shell + section-nav band ------------------------------------------->
<template data-tpl="page"><div class="page"></div></template>
<template data-tpl="nav"><div class="tab-underline mb-3"></div></template>
<template data-tpl="nav-btn"><button></button></template>

<!-- KPI grids (slim one-row for the schedule, plain, compact) + one KPI card -->
<template data-tpl="kpi-grid-slim"><div class="kpi-grid kpi-slim kpi-onerow stagger"></div></template>
<template data-tpl="kpi-grid"><div class="kpi-grid stagger"></div></template>
<template data-tpl="kpi-grid-compact"><div class="kpi-grid kpi-compact stagger"></div></template>
<template data-tpl="kpi"><div class="kpi-card"><div class="kpi-top"><span class="kpi-label" data-slot="label"></span><span class="kpi-ico" data-slot="ico"></span></div><div class="kpi-value" data-slot="value"></div></div></template>
