  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#epal)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="14.25" fill="none" stroke="#1A43BF" stroke-opacity="0.55" stroke-width="1.5"/>
