<!DOCTYPE html>
<html lang="en" data-theme="dark">
<!-- ============================================================================
     EPAL GROUP ERP  ·  index.html
     ----------------------------------------------------------------------------
     Single entry point of the whole system. It is intentionally thin: it only
     loads the design system + the JS runtime, then core/app.js boots and builds
     everything (rail, sidebar, topbar, views) from the config registry.

     ARCHITECTURE AT A GLANCE (modular layout — see EPAL_GROUP_ERP_Modular_Architecture.md):
     the code maps 1:1 onto a future Laravel/PHP backend, readable as a spec:

       platform/design-system/css/* → the bespoke premium design system (dark-blue brand;
                                    Bootstrap *Icons* only). ⇢ Laravel: Blade layout + theme.
       platform/core/*            → app bootstrap + shell: config (module registry),
                                    eventbus, ui (DOM kit), charts, router, app (boot).
                                    ⇢ Laravel: routing, middleware, service container.
       platform/auth-rbac/*       → identity, roles, permissions (auth, permissions).
       platform/data/*            → persistence + seeded domain data: state (localStorage
                                    wrapper — the swap seam), database, seed-bd.
                                    ⇢ Laravel: Eloquent Models + Migrations + Seeders.
       platform/engines-library/* → shared business machinery: ledger (double-entry),
                                    audit, approvals (maker-checker), documents, serial,
                                    intel, rules, comments, search, engines (registry).
                                    ⇢ Laravel: Services / Domain classes.
       platform/kit/*             → reusable UI building blocks: forms, datatable, entity.
       platform/views/*           → view registry + shared wildcard screens + task board.
       platform/design-system/*   → Tailwind design lock (config + committed build).
       companies/<x>/             → each sister concern, self-contained: module.json
                                    manifest, modules/<id>/view.js screens, app/atmosphere
                                    ambient scenes. Unbuilt screens fall back to a live
                                    scaffold. ⇢ Laravel: Blade views + Controllers.

     LOAD ORDER MATTERS (no build step, everything hangs off a global window.EPAL):
     config first, then the layers in dependency order, views next, app.js LAST.

     No build step. Open index.html through a local web server (recommended) or
     directly — everything is vanilla + CDN.
============================================================================= -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070b14" />
  <meta name="description" content="Epal Group — modular multi-company ERP command center." />
  <title>Epal Group · Enterprise Command Center</title>

  <!-- Fonts: Inter (UI), Sora (display), Plus Jakarta (fallback), JetBrains Mono (numbers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Bootstrap Icons (icon set only — full Bootstrap CSS is intentionally NOT
       loaded to avoid clobbering the bespoke .btn/.card/.nav design system). -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Design system (order matters: tokens → base → layout → components → motion) -->
  <link rel="stylesheet" href="platform/design-system/css/tokens.css" />
  <link rel="stylesheet" href="platform/design-system/css/base.css" />
  <link rel="stylesheet" href="platform/design-system/css/layout.css" />
  <link rel="stylesheet" href="platform/design-system/css/components.css" />
  <link rel="stylesheet" href="platform/design-system/css/elevation.css" />
  <link rel="stylesheet" href="platform/design-system/css/deepcore.css" />
  <link rel="stylesheet" href="platform/design-system/css/animations.css" />
  <link rel="stylesheet" href="platform/design-system/css/atmosphere.css" />
  <!-- Ambient background scenes — each lives with its company (companies/<x>/app/atmosphere/) -->
  <link rel="stylesheet" href="companies/travels/app/atmosphere/travels-scene.css" />
  <link rel="stylesheet" href="companies/woodart/app/atmosphere/interior-scene.css" />
  <!-- MIGRATION Phase 1 (see MIGRATION_STATUS.md): committed Tailwind build.
       tw- prefixed utilities only; EMPTY until Phase-4 conversions add classes.
       Loads last so converted screens' utilities win specificity ties. -->
  <link rel="stylesheet" href="platform/design-system/css/tailwind.built.css" />
</head>

<body>
  <!-- Boot splash (removed by core/app.js once the shell renders) -->
  <div id="boot-splash">
    <div class="boot-logo">
      <div class="boot-mark">E</div>
      <div class="boot-name">Epal&nbsp;Group&nbsp;ERP</div>
      <div class="boot-bar"></div>
    </div>
  </div>

  <!-- The application shell is injected here by core/app.js -->
  <div id="app" class="app"></div>

  <!-- ===================== VENDOR (CDN) ===================== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- three.js (deferred, non-blocking) + the ambient 3D flight backdrop. Both
       degrade gracefully: if three.js can't load, ambient3d.js simply no-ops. -->
  <script defer src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script defer src="platform/atmosphere/ambient3d.js"></script>

  <!-- ===================== CORE RUNTIME ===================== -->
  <!-- config MUST load first (ui/db/auth read from it at load time). -->
  <script src="platform/core/config.js"></script>
  <script src="platform/data/state.js"></script>
  <script src="platform/core/eventbus.js"></script>
  <script src="platform/core/ui.js"></script>
  <script src="platform/core/charts.js"></script>
  <!-- Deep Core engine registry (self-registration backbone) — before engines. -->
  <script src="platform/engines-library/engines.js"></script>
  <script src="platform/data/database.js"></script>
  <!-- deep operational seed for every company (idempotent; consumed by db.seed()) -->
  <script src="platform/data/seed-bd.js"></script>
  <!-- ===== Deep Core engines (brain, nerves, backbone) — self-register ===== -->
  <script src="platform/engines-library/serial.js"></script>
  <script src="platform/engines-library/ledger.js"></script>
  <script src="platform/engines-library/payroll.js"></script>
  <script src="platform/engines-library/audit.js"></script>
  <script src="platform/engines-library/approvals.js"></script>
  <script src="platform/engines-library/rules.js"></script>
  <script src="platform/engines-library/documents.js"></script>
  <script src="platform/engines-library/intel.js"></script>
  <script src="platform/engines-library/comments.js"></script>
  <script src="platform/engines-library/search.js"></script>
  <!-- shared UI building blocks used by the graduated views -->
  <script src="platform/kit/forms.js"></script>
  <script src="platform/kit/datatable.js"></script>
  <script src="platform/kit/entity.js"></script>
  <script src="platform/kit/emp-profile.js"></script>
  <script src="platform/kit/hr-setup.js"></script>
  <script src="platform/kit/loans.js"></script>
  <script src="platform/kit/cash.js"></script>
  <script src="platform/kit/expenses.js"></script>
  <script src="platform/auth-rbac/auth.js"></script>
  <script src="platform/auth-rbac/permissions.js"></script>
  <script src="platform/core/router.js"></script>
  <!-- Auto-discovery (Phase 3a): folder present = company/module appears. Default
       present + file:// fallback, so no visual/behaviour change when all folders
       exist. Loads before app.js (which runs the scan after boot). -->
  <script src="platform/discovery/discovery.js"></script>
  <!-- Group bridge (Phase 3b): the explicit event line companies roll up through.
       Additive — the group books are computed on-read (now discovery-aware); this
       is the contract seam + an equivalence check. Changes no number. -->
  <script src="platform/bridge/bridge.js"></script>

  <!-- ===================== VIEWS (self-registering) ===================== -->
  <!-- registry first (defines EPAL.view + the placeholder scaffold). -->
  <script src="platform/views/registry.js"></script>
  <!-- shared wildcard factories: give EVERY company real screens (router prefers
       a specific view, else falls back to these star-slash-module views). -->
  <script src="platform/views/shared/company-dashboard.js"></script>
  <script src="platform/views/shared/company-modules.js"></script>
  <!-- Group command layer -->
  <script src="companies/group-cockpit/modules/dashboard/view.js"></script>
  <script src="companies/group-cockpit/modules/crm/view.js"></script>
  <script src="companies/group-cockpit/modules/finance/view.js"></script>
  <script src="companies/group-cockpit/modules/master-accounts/view.js"></script>
  <script src="companies/group-cockpit/modules/analytics/view.js"></script>
  <script src="companies/group-cockpit/modules/reports/view.js"></script>
  <script src="companies/group-cockpit/modules/companies/view.js"></script>
  <script src="companies/group-cockpit/modules/automation/view.js"></script>
  <script src="companies/group-cockpit/modules/notifications/view.js"></script>
  <script src="companies/group-cockpit/modules/settings/view.js"></script>
  <!-- Deep Core group screens -->
  <script src="companies/group-cockpit/modules/briefing/view.js"></script>
  <script src="companies/group-cockpit/modules/documents/view.js"></script>
  <script src="companies/group-cockpit/modules/approvals/view.js"></script>
  <script src="companies/group-cockpit/modules/activity-log/view.js"></script>
  <!-- Admin + cross-company -->
  <script src="companies/group-cockpit/modules/module-manager/view.js"></script>
  <script src="platform/views/tasks/board.js"></script>
  <script src="companies/group-cockpit/modules/employees/view.js"></script>
  <script src="companies/group-cockpit/modules/meetings/view.js"></script>
  <!-- Travels (specific views override the shared wildcards) -->
  <script src="companies/travels/modules/dashboard/view.js"></script>
  <script src="companies/travels/modules/visa-processing/view.js"></script>
  <script src="companies/travels/modules/air-ticketing/view.js"></script>
  <script src="companies/travels/modules/vendor-agent/view.js"></script>
  <script src="companies/travels/modules/contract-flight/view.js"></script>
  <script src="companies/travels/modules/contract-file/view.js"></script>
  <script src="companies/travels/modules/file-management/view.js"></script>
  <script src="companies/travels/modules/passport-mgmt/view.js"></script>
  <script src="companies/travels/modules/marketing/view.js"></script>
  <script src="companies/travels/modules/accounts/view.js"></script>
  <script src="companies/travels/modules/payroll/view.js"></script>
  <script src="companies/travels/modules/hrm/view.js"></script>
  <script src="companies/travels/modules/crm/view.js"></script>
  <script src="companies/travels/modules/ledgers/view.js"></script>
  <script src="companies/travels/modules/reports/view.js"></script>
  <script src="companies/travels/modules/analytics/view.js"></script>
  <script src="companies/travels/modules/automation/view.js"></script>
  <script src="companies/travels/modules/settings/view.js"></script>
  <!-- Per-concern deep modules -->
  <script src="companies/shop/modules/pos/view.js"></script>
  <script src="companies/construction/modules/projects/view.js"></script>
  <script src="companies/woodart/modules/projects/view.js"></script>
  <script src="companies/it/modules/projects/view.js"></script>

  <!-- ===================== BOOT (must be LAST) ===================== -->
  <!-- app.js auto-initialises after all views have registered themselves. -->
  <script src="platform/core/app.js"></script>
  <!-- Ambient background scenes — self-contained, mount behind the content. -->
  <script src="companies/travels/app/atmosphere/travels-scene.js"></script>
  <script src="companies/woodart/app/atmosphere/interior-scene.js"></script>
</body>
</html>
