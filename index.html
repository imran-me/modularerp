<!DOCTYPE html>
<html lang="en" data-theme="dark">
<!-- ============================================================================
     EPAL GROUP ERP  ·  index.html
     ----------------------------------------------------------------------------
     Single entry point of the whole system. It is intentionally thin: it only
     loads the design system + the JS runtime, then core/app.js boots and builds
     everything (rail, sidebar, topbar, views) from the config registry.

     ARCHITECTURE AT A GLANCE — the JS is grouped into layers that map 1:1 onto a
     future Laravel/PHP backend, so a developer can read this front-end as a spec:

       assets/css/*         → the bespoke premium design system (navy/platinum/gold;
                              Bootstrap *Icons* only). ⇢ Laravel: Blade layout + theme.
       assets/js/kernel/*   → app bootstrap + shell: config (module registry),
                              eventbus, ui (DOM kit), charts, auth, router, app (boot).
                              ⇢ Laravel: routing, middleware, service container, layout.
       assets/js/data/*     → persistence + seeded domain data: state (localStorage
                              wrapper — the swap seam), database, seed-bd.
                              ⇢ Laravel: Eloquent Models + Migrations + Seeders.
       assets/js/engines/*  → business logic services: ledger (double-entry), audit,
                              approvals (maker-checker), documents, serial, intel,
                              rules (automation), comments, search, permissions,
                              engines (registry). ⇢ Laravel: Services / Domain classes.
       assets/js/kit/*      → reusable UI building blocks: forms, datatable, entity
                              (CRUD factory). ⇢ Laravel: Blade components / form requests.
       assets/js/views/*    → one file per screen; each self-registers into EPAL.views.
                              Unbuilt screens fall back to a live scaffold, so the whole
                              navigation works today. ⇢ Laravel: Blade views + Controllers.

     LOAD ORDER MATTERS (no build step, everything hangs off a global window.EPAL):
     config first, then the layers in dependency order, views next, app.js LAST.

     No build step. Open index.html through a local web server (recommended) or
     directly — everything is vanilla + CDN.
============================================================================= -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070b14" />
  <meta name="description" content="Epal Group — modular multi-company ERP command center." />
  <title>Epal Group · Enterprise Command Center</title>

  <!-- Fonts: Inter (UI), Sora (display), Plus Jakarta (fallback), JetBrains Mono (numbers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Bootstrap Icons (icon set only — full Bootstrap CSS is intentionally NOT
       loaded to avoid clobbering the bespoke .btn/.card/.nav design system). -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Design system (order matters: tokens → base → layout → components → motion) -->
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/deepcore.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link rel="stylesheet" href="assets/css/atmosphere.css" />
  <!-- Ambient background scenes — all animation themes live in assets/atmosphere/ -->
  <link rel="stylesheet" href="assets/atmosphere/travels-scene.css" />
  <link rel="stylesheet" href="assets/atmosphere/interior-scene.css" />
  <!-- MIGRATION Phase 1 (see MIGRATION_STATUS.md): committed Tailwind build.
       tw- prefixed utilities only; EMPTY until Phase-4 conversions add classes.
       Loads last so converted screens' utilities win specificity ties. -->
  <link rel="stylesheet" href="assets/css/tailwind.built.css" />
</head>

<body>
  <!-- Boot splash (removed by core/app.js once the shell renders) -->
  <div id="boot-splash">
    <div class="boot-logo">
      <div class="boot-mark">E</div>
      <div class="boot-name">Epal&nbsp;Group&nbsp;ERP</div>
      <div class="boot-bar"></div>
    </div>
  </div>

  <!-- The application shell is injected here by core/app.js -->
  <div id="app" class="app"></div>

  <!-- ===================== VENDOR (CDN) ===================== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- ===================== CORE RUNTIME ===================== -->
  <!-- config MUST load first (ui/db/auth read from it at load time). -->
  <script src="assets/js/kernel/config.js"></script>
  <script src="assets/js/data/state.js"></script>
  <script src="assets/js/kernel/eventbus.js"></script>
  <script src="assets/js/kernel/ui.js"></script>
  <script src="assets/js/kernel/charts.js"></script>
  <!-- Deep Core engine registry (self-registration backbone) — before engines. -->
  <script src="assets/js/engines/engines.js"></script>
  <script src="assets/js/data/database.js"></script>
  <!-- deep operational seed for every company (idempotent; consumed by db.seed()) -->
  <script src="assets/js/data/seed-bd.js"></script>
  <!-- ===== Deep Core engines (brain, nerves, backbone) — self-register ===== -->
  <script src="assets/js/engines/serial.js"></script>
  <script src="assets/js/engines/ledger.js"></script>
  <script src="assets/js/engines/audit.js"></script>
  <script src="assets/js/engines/approvals.js"></script>
  <script src="assets/js/engines/rules.js"></script>
  <script src="assets/js/engines/documents.js"></script>
  <script src="assets/js/engines/intel.js"></script>
  <script src="assets/js/engines/comments.js"></script>
  <script src="assets/js/engines/search.js"></script>
  <!-- shared UI building blocks used by the graduated views -->
  <script src="assets/js/kit/forms.js"></script>
  <script src="assets/js/kit/datatable.js"></script>
  <script src="assets/js/kit/entity.js"></script>
  <script src="assets/js/kernel/auth.js"></script>
  <script src="assets/js/engines/permissions.js"></script>
  <script src="assets/js/kernel/router.js"></script>

  <!-- ===================== VIEWS (self-registering) ===================== -->
  <!-- registry first (defines EPAL.view + the placeholder scaffold). -->
  <script src="assets/js/views/registry.js"></script>
  <!-- shared wildcard factories: give EVERY company real screens (router prefers
       a specific view, else falls back to these star-slash-module views). -->
  <script src="assets/js/views/shared/company-dashboard.js"></script>
  <script src="assets/js/views/shared/company-modules.js"></script>
  <!-- Group command layer -->
  <script src="assets/js/views/group/dashboard.js"></script>
  <script src="assets/js/views/group/crm.js"></script>
  <script src="assets/js/views/group/finance.js"></script>
  <script src="assets/js/views/group/analytics.js"></script>
  <script src="assets/js/views/group/reports.js"></script>
  <script src="assets/js/views/group/companies.js"></script>
  <script src="assets/js/views/group/automation.js"></script>
  <script src="assets/js/views/group/notifications.js"></script>
  <script src="assets/js/views/group/settings.js"></script>
  <!-- Deep Core group screens -->
  <script src="assets/js/views/group/briefing.js"></script>
  <script src="assets/js/views/group/documents.js"></script>
  <script src="assets/js/views/group/approvals.js"></script>
  <script src="assets/js/views/group/activity-log.js"></script>
  <!-- Admin + cross-company -->
  <script src="assets/js/views/admin/module-manager.js"></script>
  <script src="assets/js/views/tasks/board.js"></script>
  <script src="assets/js/views/admin/employees.js"></script>
  <!-- Travels (specific views override the shared wildcards) -->
  <script src="assets/js/views/travels/dashboard.js"></script>
  <script src="assets/js/views/travels/visa-processing.js"></script>
  <script src="assets/js/views/travels/air-ticketing.js"></script>
  <script src="assets/js/views/travels/vendor-agent.js"></script>
  <script src="assets/js/views/travels/contract-flight.js"></script>
  <script src="assets/js/views/travels/marketing.js"></script>
  <!-- Per-concern deep modules -->
  <script src="assets/js/views/shop/pos.js"></script>
  <script src="assets/js/views/construction/projects.js"></script>
  <script src="assets/js/views/woodart/projects.js"></script>
  <script src="assets/js/views/it/projects.js"></script>

  <!-- ===================== BOOT (must be LAST) ===================== -->
  <!-- app.js auto-initialises after all views have registered themselves. -->
  <script src="assets/js/kernel/app.js"></script>
  <!-- Ambient background scenes — self-contained, mount behind the content. -->
  <script src="assets/atmosphere/travels-scene.js"></script>
  <script src="assets/atmosphere/interior-scene.js"></script>
</body>
</html>
